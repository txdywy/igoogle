<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Google Release Radar tracks Chrome, ChromeOS, Pixel Android pages, Android Security Bulletins, SDK repository versions, and official RSS feeds."
    />
    <title>Google Release Radar</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <a class="brand" href="#">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"><path d="M3 12h4l2-7 4 14 2-7h6"/></svg>
          Google Release Radar
        </a>
      </header>
      <main style="max-width:1400px;margin:0 auto;padding:34px 32px 56px">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text" style="width:60%"></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px">
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
